name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]
    # Optional: Only run this workflow if files in the website folder change
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './website/package-lock.json' # Point cache to your folder
          
      - name: Install dependencies
        working-directory: ./website    # Tell GH Actions to run this inside the folder
        run: npm install
        
      - name: Build
        working-directory: ./website    # Tell GH Actions to run this inside the folder
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './website/dist'        # Point to the dist folder inside your dedicated folder
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4